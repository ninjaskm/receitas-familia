{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h3 class="mb-4">Entrar</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <p class="mt-3 text-center">
            Não tem conta? <a href="{% url 'registrar' %}">Cadastre-se</a>
        </p>
    </div>
</div>
{% endblock %}
