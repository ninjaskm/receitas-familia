{% extends 'base.html' %}

{% block title %}Criar Conta — Receitas da Família{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block content %}
<div class="auth-layout">
    <div class="auth-card">
        <div class="auth-card__brand">
            <div class="auth-card__logo" aria-hidden="true">✨</div>
            <h1 class="auth-card__title">Criar conta</h1>
            <p class="auth-card__subtitle">Junte-se à nossa cozinha digital</p>
        </div>

        <form method="post" class="form-app">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-app btn-app--primary btn-app--lg w-100 mt-2">Cadastrar</button>
        </form>

        <div class="auth-card__footer">
            Já tem conta? <a href="{% url 'login' %}"><strong>Entrar</strong></a>
        </div>
    </div>
</div>
{% endblock %}
