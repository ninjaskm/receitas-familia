{% extends 'base.html' %}

{% block title %}Adicionar Receita — Receitas da Família{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="form-card form-card--wide mx-auto">
            <h2 class="form-card__title">Nova receita</h2>
            <p class="form-card__subtitle">Adicionar receita em <strong>{{ grupo.nome }}</strong></p>
            <form method="post" enctype="multipart/form-data" class="form-app">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <button type="submit" class="btn-app btn-app--primary">Salvar Receita</button>
                    <a href="{% url 'detalhe_grupo' grupo.pk %}" class="btn-app btn-app--secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
