{% extends 'base.html' %}

{% block title %}Avaliar — {{ receita.titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="form-card mx-auto">
            <h2 class="form-card__title">Avaliar receita</h2>
            <p class="form-card__subtitle">{{ receita.titulo }}</p>
            <form method="post" class="form-app" id="formAvaliar">
                {% csrf_token %}

                {% include 'partials/star_rating_field.html' %}

                <div class="mb-3">
                    <label for="id_comentario" class="form-label">Comentário (opcional)</label>
                    {{ form.comentario }}
                    {{ form.comentario.errors }}
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-app btn-app--primary">Enviar Avaliação</button>
                    <a href="{% url 'detalhe_receita' receita.pk %}" class="btn-app btn-app--secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
