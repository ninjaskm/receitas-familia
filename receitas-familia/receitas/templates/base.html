<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas da Família</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'feed' %}">🍽️ Receitas da Família</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="{% url 'feed' %}" class="btn btn-outline-light btn-sm me-3">🍽️ Feed</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm me-2">Meus Grupos</a>
                    <div class="dropdown me-2">
                        <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            Olá, {{ user.username }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" href="{% url 'receitas_favoritas' %}">❤️ Receitas Salvas</a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="{% url 'minhas_receitas_privadas' %}">🔒 Receitas Privadas</a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger" href="{% url 'logout' %}">Sair</a>
                            </li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Entrar</a>
                    <a href="{% url 'registrar' %}" class="btn btn-light btn-sm">Cadastrar</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
