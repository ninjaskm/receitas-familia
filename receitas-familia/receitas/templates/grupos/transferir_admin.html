{% extends 'base.html' %}

{% block title %}Transferir Admin — Receitas da Família{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="form-card mx-auto">
            <h2 class="form-card__title">Transferir administrador</h2>
            <p class="form-card__subtitle">
                Escolha um novo admin para o grupo <strong>{{ grupo.nome }}</strong> antes de sair.
            </p>
            <form method="post" class="form-app">
                {% csrf_token %}
                {% for membro in membros %}
                    <label class="form-check-app" for="membro{{ membro.pk }}">
                        <input class="form-check-input" type="radio" name="novo_admin" value="{{ membro.pk }}" id="membro{{ membro.pk }}" required>
                        <span>{{ membro.username }}</span>
                    </label>
                {% endfor %}
                <div class="form-actions">
                    <button type="submit" class="btn-app btn-app--danger">Transferir e sair</button>
                    <a href="{% url 'detalhe_grupo' grupo.pk %}" class="btn-app btn-app--secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
