{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h3 class="mb-4">Transferir admin do grupo "{{ grupo.nome }}"</h3>
        <p class="text-muted">Escolha um membro para ser o novo administrador antes de sair:</p>
        <form method="post">
            {% csrf_token %}
            {% for membro in membros %}
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="novo_admin" value="{{ membro.pk }}" id="membro{{ membro.pk }}" required>
                    <label class="form-check-label" for="membro{{ membro.pk }}">
                        {{ membro.username }}
                    </label>
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-danger mt-3">Transferir e sair do grupo</button>
            <a href="{% url 'detalhe_grupo' grupo.pk %}" class="btn btn-secondary ms-2 mt-3">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
