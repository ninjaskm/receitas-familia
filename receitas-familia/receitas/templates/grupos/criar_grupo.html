{% extends 'base.html' %}

{% block title %}Criar Grupo — Receitas da Família{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-7">
        <div class="form-card mx-auto">
            <h2 class="form-card__title">Criar Grupo Familiar</h2>
            <p class="form-card__subtitle">Reúna sua família em um espaço para receitas exclusivas</p>
            <form method="post" class="form-app">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <button type="submit" class="btn-app btn-app--primary">Criar Grupo</button>
                    <a href="{% url 'home' %}" class="btn-app btn-app--secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
